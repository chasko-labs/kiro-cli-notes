# validate knowledge.json is committed and current when source docs change
# export-knowledge.js requires a local MCP server + ollama — not runnable in CI
# to regenerate: run `node knowledge-base/export-pipeline/export-knowledge.js` locally,
# commit the updated knowledge-base/static-site/knowledge.json, then push

when:
  - event: [push, pull_request, manual]
    branch: main
    path:
      include:
        - docs/**
        - video-content/**
        - steering/**
        - workflows/**
        - knowledge-base/static-site/**

steps:
  - name: validate-knowledge-json
    image: alpine:3.21
    commands:
      - apk add --no-cache jq >/dev/null
      - "[ -f knowledge-base/static-site/knowledge.json ] || { echo 'missing knowledge.json — run export-knowledge.js locally and commit'; exit 1; }"
      - jq empty knowledge-base/static-site/knowledge.json || { echo 'invalid json in knowledge.json'; exit 1; }
      - export_date=$(jq -r '.metadata.exportDate' knowledge-base/static-site/knowledge.json)
      - chunk_count=$(jq '.metadata.totalChunks' knowledge-base/static-site/knowledge.json)
      - echo "export $export_date | chunks $chunk_count"
      - "[ \"$chunk_count\" -ge 10 ] || { echo \"chunk count too low: $chunk_count\"; exit 1; }"
