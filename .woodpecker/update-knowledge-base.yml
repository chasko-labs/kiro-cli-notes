# regenerate knowledge.json when source docs change
# ollama runs at dev time only; export-knowledge.js has no ollama dependency

when:
  - event: [push, manual]
    branch: main
    path:
      include:
        - docs/**
        - video-content/**
        - steering/**
        - workflows/**

steps:
  - name: install-dependencies
    image: node:18-alpine
    commands:
      - cd knowledge-base/export-pipeline
      - npm ci

  - name: update-knowledge-base
    image: node:18-alpine
    commands:
      - cd knowledge-base/export-pipeline
      - node export-knowledge.js
      - chunk_count=$(jq '.metadata.totalChunks' ../static-site/knowledge.json)
      - echo "chunks $chunk_count"
      - "[ \"$chunk_count\" -ge 10 ] || { echo \"insufficient chunks: $chunk_count\"; exit 1; }"

  - name: commit-changes
    image: alpine/git:latest
    environment:
      GIT_PUSH_TOKEN:
        from_secret: git_push_token
    commands:
      - git config --local user.email "action@abstractspacecraft.com"
      - git config --local user.name "Woodpecker CI"
      - |
        if git diff --quiet knowledge-base/static-site/knowledge.json; then
          echo "no changes"
        else
          git add knowledge-base/static-site/knowledge.json knowledge-base/static-site/knowledge-summary.txt
          git commit -m "chore: auto-update knowledge base $(date -u +%Y-%m-%d)"
          git push "https://x-token:${GIT_PUSH_TOKEN}@github.com/chasko-labs/kiro-cli-notes.git" main
        fi
