# export-knowledge.json on push to main
# pages source is branch-served — no build/deploy step needed here
# ollama is a local dev tool; embedding happens offline, not in CI

when:
  - event: [push, manual]
    branch: main

steps:
  - name: install-export-pipeline
    image: node:18-alpine
    commands:
      - cd knowledge-base/export-pipeline
      - npm ci

  - name: export-knowledge-base
    image: node:18-alpine
    commands:
      - cd knowledge-base/export-pipeline
      - node export-knowledge.js
      - jq '.metadata.totalChunks' ../static-site/knowledge.json
