# validate committed knowledge.json on push to main
# pages source is branch-served — no build/deploy step
# export-knowledge.js starts an MCP server + ollama — local dev only, not CI

when:
  - event: [push, pull_request, manual]
    branch: main
    path:
      include:
        - "**/*.md"
        - knowledge-base/static-site/**
        - .woodpecker/**

steps:
  - name: validate-knowledge-json
    image: alpine:3.21
    commands:
      - apk add --no-cache jq >/dev/null
      - "[ -f knowledge-base/static-site/knowledge.json ] || { echo 'missing knowledge.json'; exit 1; }"
      - jq empty knowledge-base/static-site/knowledge.json || { echo 'invalid json'; exit 1; }
      - chunk_count=$(jq '.metadata.totalChunks' knowledge-base/static-site/knowledge.json)
      - echo "chunks $chunk_count"
      - "[ \"$chunk_count\" -ge 10 ] || { echo \"chunk count too low: $chunk_count\"; exit 1; }"

  - name: markdown-lint
    image: davidanson/markdownlint-cli2:v0.14.0
    commands:
      - markdownlint-cli2 "**/*.md" "#node_modules"
