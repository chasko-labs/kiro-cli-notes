# periodic health check — validate knowledge.json + static site assets
# runs every 6h via cron; also available via manual trigger

when:
  - event: [cron, manual]
    cron: "0 */6 * * *"

steps:
  - name: validate-knowledge-base
    image: alpine:3.21
    when:
      - event: [cron, manual]
    commands:
      - apk add --no-cache jq >/dev/null
      - "[ -f knowledge-base/static-site/knowledge.json ] || { echo 'missing knowledge.json'; exit 1; }"
      - jq empty knowledge-base/static-site/knowledge.json || { echo 'invalid json'; exit 1; }
      - chunk_count=$(jq '.metadata.totalChunks' knowledge-base/static-site/knowledge.json)
      - echo "chunks $chunk_count"
      - export_date=$(jq -r '.metadata.exportDate' knowledge-base/static-site/knowledge.json)
      - echo "export $export_date"

  - name: test-static-site
    image: alpine:3.21
    when:
      - event: [cron, manual]
    commands:
      - cd knowledge-base/static-site
      - |
        for file in index.html js/app.js js/search.js js/indexeddb.js css/styles.css; do
          [ -f "$file" ] || { echo "missing $file"; exit 1; }
        done
      - echo "static site files ok"
